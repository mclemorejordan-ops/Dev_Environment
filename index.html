<!-- Instagram-style Comments Modal (UI only, additive) -->
<style>
  .igCmtShell{ display:flex; flex-direction:column; gap:10px; height:min(72vh, 620px); }
  .igCmtHeader{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .igCmtMeta{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .igCmtMetaTitle{ font-weight:950; font-size:13px; letter-spacing:.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .igCmtMetaWho{ opacity:.70; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .igCmtCount{ flex:0 0 auto; align-self:flex-start; font-size:12px; font-weight:900; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: rgba(255,255,255,.88); }

  .igCmtListWrap{ flex:1; min-height:0; }
  .igCmtList{ height:100%; overflow:auto; padding-right:4px; display:flex; flex-direction:column; gap:10px; }
  .igCmtThread{ display:flex; flex-direction:column; gap:10px; }
  .igCmtNode{ display:flex; flex-direction:column; gap:8px; }

  .igCmtRow{ display:flex; gap:10px; align-items:flex-start; }
  .igCmtAvatar{ width:34px; height:34px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-weight:950; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); color: rgba(255,255,255,.92); flex:0 0 auto; }
  .igCmtBubble{ flex:1; border-radius:16px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.05); padding:10px 12px; }
  .igCmtTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .igCmtName{ font-weight:950; font-size:12px; }
  .igCmtTime{ opacity:.7; font-size:12px; }
  .igCmtBody{ margin-top:6px; white-space:pre-wrap; opacity:.92; }
  .igCmtActions{ margin-top:8px; display:flex; gap:10px; flex-wrap:wrap; }
  .igCmtAct{ border:0; background:transparent; color: rgba(255,255,255,.78); font-size:12px; font-weight:900; padding:0; cursor:pointer; }
  .igCmtAct.danger{ color: rgba(255,140,140,.92); }

  .igCmtComposer{ border-top:1px solid rgba(255,255,255,.10); padding-top:10px; display:flex; flex-direction:column; gap:8px; }
  .igCmtReactRow{ display:flex; gap:8px; overflow:auto; padding-bottom:2px; }
  .igCmtReact{ flex:0 0 auto; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: rgba(255,255,255,.92); border-radius:999px; padding:6px 10px; font-size:16px; line-height:1; cursor:pointer; }

  .igCmtComposeRow{ display:flex; gap:10px; align-items:flex-end; }
  .igCmtInput{ flex:1; width:100%; min-height:52px; max-height:120px; resize:none; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.20); color: rgba(255,255,255,.92); outline:none; }
  .igCmtSend{ flex:0 0 auto; border-radius:14px; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.08); color: rgba(255,255,255,.92); font-size:18px; padding:10px 12px; line-height:1; cursor:pointer; }
</style>
